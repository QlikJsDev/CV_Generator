<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Generator · Select Advisory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Albert+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="layout">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-dot green"></div>
        <div class="brand-dot orange"></div>
        <div class="brand-name">CV Generator</div>
        <div class="brand-sub">Select Advisory</div>
      </div>

      <div class="input-mode-toggle">
        <button class="mode-btn active" data-mode="manual">✏️ Manual</button>
        <button class="mode-btn" data-mode="upload">📄 Import BD</button>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <button class="btn-generate" id="btn-generate">
          <span class="btn-generate-icon">⬇</span>
          Generate CV
        </button>
      </div>
    </aside>

    <!-- ── Main content ─────────────────────────────────────── -->
    <main class="main" id="main">

      <!-- Upload banner -->
      <div class="upload-banner hidden" id="upload-banner">
        <div class="upload-card">
          <div class="upload-icon">📄</div>
          <h2>Import a Beyond Data CV</h2>
          <p>Drop a <code>.docx</code> file here or click to browse.<br>
             All fields will be auto-filled — you can edit them before generating.</p>
          <label class="btn-upload-label" for="file-input">
            Choose file
            <input type="file" id="file-input" accept=".docx" hidden>
          </label>
          <div id="upload-filename" class="upload-filename"></div>
          <button class="btn-primary" id="btn-parse" disabled>Parse &amp; fill form</button>
          <div id="upload-status" class="upload-status"></div>
        </div>
      </div>

      <!-- Form sections (rendered by app.js) -->
      <div id="form-root"></div>

    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
