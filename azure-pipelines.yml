trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  webAppName: 'CVGenerator-Agilos'
  nodeVersion: '20.x'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install Node.js

    - script: npm install --production
      displayName: npm install

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true
        excludePatterns: |
          .git/**
          .github/**
          temp/**
          test/**
          docs/**
          *.pdf
          **/*.docx
      displayName: Package app

    - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
      artifact: drop

- stage: Deploy
  displayName: Deploy to Azure
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - download: current
      artifact: drop

    - script: |
        curl -X POST \
          "https://$(webAppName).scm.azurewebsites.net/api/zipdeploy" \
          -u "$KUDU_USER:$KUDU_PASS" \
          --data-binary @$(Pipeline.Workspace)/drop/$(Build.BuildId).zip \
          -H "Content-Type: application/octet-stream" \
          --fail \
          --silent \
          --show-error
        echo "Deployment complete"
      env:
        KUDU_USER: $(KUDU_USER)
        KUDU_PASS: $(KUDU_PASS)
      displayName: Deploy via Kudu ZipDeploy
